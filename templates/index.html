<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Bot Panel | CKRPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .panel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
        }
        .ios-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            outline: none;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            width: 100%;
            color: #fff;
        }
        .ios-btn {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .ios-btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.15); }
        
        /* Terminal Box - Bold & White */
        #terminalBox {
            display: none;
            background: #000;
            border: 2px solid #222;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .terminal-content {
            color: #ffffff;
            font-weight: 900;
            font-size: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .no-scrollbar::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="panel-card p-6 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold tracking-tight text-gray-100">Free Fire Bot Panel</h1>
            <p class="text-[10px] text-blue-400 font-bold mt-1 tracking-widest uppercase opacity-80">Developer: Def Sajan</p>
        </div>

        <div class="space-y-4 mb-6">
            <input id="targetUID" type="number" placeholder="Enter Player UID" class="ios-input font-mono">
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="handleAction('add')" class="ios-btn text-green-400">Add Friend</button>
                <button onclick="handleAction('track')" class="ios-btn text-blue-400 font-bold">Track Player</button>
            </div>
            <button onclick="handleAction('remove')" class="w-full ios-btn text-red-400">Remove Friend</button>
        </div>

        <div id="terminalBox" class="no-scrollbar">
            <p class="text-[9px] text-gray-500 mb-2 uppercase font-bold tracking-widest">Tracking Response</p>
            <div id="terminalBody" class="terminal-content"></div>
        </div>

        <div class="space-y-4 mt-6">
            <div class="flex justify-between items-center px-1">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Friend List</p>
                <button onclick="loadList()" class="bg-blue-600 text-white text-[9px] px-3 py-1 rounded-full font-bold">Refresh List</button>
            </div>
            <div id="listBody" class="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
                <p class="text-center text-[10px] text-gray-600 py-4 italic">List is empty</p>
            </div>
            <button onclick="removeAll()" class="w-full mt-2 ios-btn bg-red-500/10 text-red-500 text-[11px] uppercase tracking-tighter">Remove All Friends</button>
        </div>
    </div>

    <script>
        // Clean and vertical response formatter
        function cleanFormat(obj) {
            let result = "";
            for (let key in obj) {
                if (typeof obj[key] === 'object' && obj[key] !== null) {
                    result += `${key.toUpperCase()}:\n${cleanFormat(obj[key])}`;
                } else {
                    let val = String(obj[key]).replace(/[\[\]{}'"]/g, '');
                    result += `| ${key.toUpperCase()}: ${val}\n`;
                }
            }
            return result;
        }

        async function handleAction(type, uid = null) {
            const finalUid = uid || document.getElementById('targetUID').value;
            const termBox = document.getElementById('terminalBox');
            const termBody = document.getElementById('terminalBody');

            if(!finalUid) {
                Swal.fire({ icon: 'error', title: 'Enter UID', toast: true, position: 'top', showConfirmButton: false, timer: 1500 });
                return;
            }

            if(type === 'track') {
                termBox.style.display = 'block';
                termBody.innerText = "INITIALIZING TRACKER...";
            }

            const res = await fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type, target_uid: finalUid })
            });
            const data = await res.json();

            if(type === 'track') {
                termBody.innerText = cleanFormat(data);
            } else {
                termBox.style.display = 'none';
                Swal.fire({ icon: 'success', title: 'Done', toast: true, position: 'top', showConfirmButton: false, timer: 1500 });
                if(type === 'remove' || type === 'add') loadList();
            }
        }

        async function loadList() {
            const box = document.getElementById('listBody');
            box.innerHTML = '<p class="text-center text-[10px] py-4 text-gray-500">Syncing...</p>';
            
            const res = await fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'get_list' })
            });
            const data = await res.json();
            const friends = data.friends || data.data || [];

            if(friends.length === 0) {
                box.innerHTML = '<p class="text-center text-[10px] py-4 text-gray-500 uppercase">Empty</p>';
                return;
            }

            box.innerHTML = friends.map(f => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                    <div class="truncate">
                        <p class="text-xs font-bold text-gray-200 truncate">${f.name || 'Unknown'}</p>
                        <p class="text-[9px] text-gray-500 font-mono">${f.uid}</p>
                    </div>
                    <button onclick="handleAction('remove', '${f.uid}')" class="text-red-400 text-[10px] font-bold ml-2">Delete</button>
                </div>
            `).join('');
        }
        
        function removeAll() {
            Swal.fire({ title: 'Are you sure?', icon: 'warning', showCancelButton: true }).then((r) => {
                if(r.isConfirmed) {
                    Swal.fire({ title: 'Processing...', toast: true, position: 'top', showConfirmButton: false });
                    // Logical loop for removal...
                }
            });
        }
    </script>
</body>
</html>
