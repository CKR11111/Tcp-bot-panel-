<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Bot Panel | CKRPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .panel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 90%;
            max-width: 350px;
        }
        .ios-input {
            background: rgba(0, 0, 0, 0.3);
            border: none;
            outline: none;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            width: 100%;
            color: #fff;
        }
        .ios-btn {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }
        .ios-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }
        /* Hidden Scrollbar */
        .no-scrollbar::-webkit-scrollbar { width: 0px; }
        
        /* SweetAlert iPhone Style */
        .swal2-popup {
            background: rgba(25, 25, 25, 0.95) !important;
            backdrop-filter: blur(10px);
            border-radius: 20px !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div class="panel-card p-6 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold tracking-tight text-gray-100">Free Fire Bot Panel</h1>
            <p class="text-[10px] text-blue-400 font-bold mt-1 tracking-widest uppercase opacity-80">Developer: Def Sajan</p>
        </div>

        <div class="space-y-4 mb-6">
            <p class="text-[10px] text-gray-500 font-bold uppercase ml-1">Actions</p>
            <input id="targetUID" type="number" placeholder="Enter UID" class="ios-input font-mono text-lg">
            
            <div class="grid grid-cols-1 gap-2">
                <button onclick="run('add')" class="ios-btn text-green-400">Add Friend</button>
                <button onclick="run('remove')" class="ios-btn text-red-400">Remove Friend</button>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Friend List</p>
                <button onclick="loadList()" class="bg-blue-600 text-white text-[9px] px-3 py-1 rounded-full font-bold">Refresh</button>
            </div>

            <div id="listBody" class="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
                <p class="text-center text-[10px] text-gray-600 py-4 italic">    </p>
            </div>

            <button onclick="removeAll()" class="w-full mt-2 ios-btn bg-red-500/10 text-red-500 text-[11px] uppercase tracking-tighter">Remove All Friends</button>
        </div>
    </div>

    <script>
        let friends = [];

        async function run(type, uid = null) {
            const finalUid = uid || document.getElementById('targetUID').value;
            if(!finalUid && type !== 'get_list') {
                Swal.fire({ icon: 'error', title: 'Enter UID', toast: true, position: 'top', showConfirmButton: false, timer: 1500 });
                return;
            }

            const res = await fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type, target_uid: finalUid })
            });
            const data = await res.json();

            if(type === 'add' || type === 'remove') {
                Swal.fire({ icon: 'success', title: 'Success', toast: true, position: 'top', showConfirmButton: false, timer: 1500 });
                if(type === 'remove') loadList();
            }
            return data;
        }

        async function loadList() {
            const box = document.getElementById('listBody');
            box.innerHTML = '<p class="text-center text-[10px] py-4 text-gray-500">Syncing...</p>';
            
            const data = await run('get_list');
            friends = data.friends || data.data || [];

            if(friends.length === 0) {
                box.innerHTML = '<p class="text-center text-[10px] py-4 text-gray-500 uppercase tracking-widest">No friends</p>';
                return;
            }

            box.innerHTML = friends.map(f => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                    <div class="truncate">
                        <p class="text-xs font-bold text-gray-200 truncate">${f.name || 'No Name'}</p>
                        <p class="text-[9px] text-gray-500 font-mono">${f.uid}</p>
                    </div>
                    <button onclick="run('remove', '${f.uid}')" class="text-red-400 text-[10px] font-bold ml-2">Delete</button>
                </div>
            `).join('');
        }

        async function removeAll() {
            if(friends.length === 0) return;
            Swal.fire({
                title: 'Clear All?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Yes, Clean'
            }).then((result) => {
                if (result.isConfirmed) {
                    friends.forEach(f => {
                        fetch('/api/action', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ type: 'remove', target_uid: f.uid })
                        });
                    });
                    Swal.fire({ title: 'Cleaning...', toast: true, position: 'top', showConfirmButton: false, timer: 2000 });
                    setTimeout(loadList, 2500);
                }
            });
        }
    </script>
</body>
</html>
